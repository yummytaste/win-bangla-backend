name: Auto Result Sync

on:
  schedule:
    - cron: "45,50,55 7 * * *"
    - cron: "45,50,55 12 * * *"
    - cron: "45,50,55 14 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Kolkata

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check Firebase Secret
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_KEY" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret missing"
            exit 1
          fi
          echo "✅ Firebase secret found"

      - name: Run Python Sync
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python backend/sync_results.py
