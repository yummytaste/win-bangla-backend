name: Auto Result Sync

on:
  schedule:
    # 1 PM result retry: 1:15 PM to 1:45 PM IST
    - cron: "45,50,55 7 * * *"
    - cron: "0,5,10,15 8 * * *"

    # 6 PM result retry: 6:15 PM to 6:45 PM IST
    - cron: "45,50,55 12 * * *"
    - cron: "0,5,10,15 13 * * *"

    # 8 PM result retry: 8:15 PM to 8:45 PM IST
    - cron: "45,50,55 14 * * *"
    - cron: "0,5,10,15 15 * * *"

  workflow_dispatch:
    inputs:
      draw:
        description: "Select Draw"
        required: true
        default: "AUTO"
        type: choice
        options:
          - AUTO
          - 1PM
          - 6PM
          - 8PM

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Result Sync
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE_DRAW: ${{ github.event.inputs.draw }}

        run: |
          echo "DRAW SELECTED = $FORCE_DRAW"

          echo "CHECK FILE EXISTS"
          ls -la backend

          echo "PYTHON COMPILE CHECK"
          python -m py_compile backend/sync_results.py

          echo "START PYTHON SCRIPT"
          python -u backend/sync_results.py

          echo "SCRIPT FINISHED"
