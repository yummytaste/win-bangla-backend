name: Speed Lottery Sync

on:
  schedule:
    # 1PM
    - cron: '0 7 * * *'
    - cron: '5 7 * * *'
    - cron: '10 7 * * *'
    - cron: '15 7 * * *'
    - cron: '20 7 * * *'
    - cron: '25 7 * * *'

    # 6PM
    - cron: '0 12 * * *'
    - cron: '5 12 * * *'
    - cron: '10 12 * * *'
    - cron: '15 12 * * *'
    - cron: '20 12 * * *'
    - cron: '25 12 * * *'

    # 8PM
    - cron: '0 14 * * *'
    - cron: '5 14 * * *'
    - cron: '10 14 * * *'
    - cron: '15 14 * * *'
    - cron: '20 14 * * *'
    - cron: '25 14 * * *'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils
          pip install -r backend/requirements.txt

      - name: Run Script
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python backend/sync_results.py
