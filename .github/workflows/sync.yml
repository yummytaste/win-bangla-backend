name: Lottery Sync Automation

on:
  schedule:
    # 1PM result
    - cron: '40 7 * * *'   # 1:10 PM IST
    - cron: '50 7 * * *'   # 1:20 PM IST
    - cron: '5 8 * * *'    # 1:35 PM IST

    # 6PM result
    - cron: '40 12 * * *'  # 6:10 PM IST
    - cron: '50 12 * * *'  # 6:20 PM IST
    - cron: '10 13 * * *'  # 6:40 PM IST

    # 8PM result
    - cron: '40 14 * * *'  # 8:10 PM IST
    - cron: '50 14 * * *'  # 8:20 PM IST
    - cron: '10 15 * * *'  # 8:40 PM IST

  workflow_dispatch:
    inputs:
      draw_code:
        description: 'Which draw to run manually?'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - 1PM
          - 6PM
          - 8PM

jobs:
  run-sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run 1PM Sync
        if: |
          github.event.schedule == '40 7 * * *' ||
          github.event.schedule == '50 7 * * *' ||
          github.event.schedule == '5 8 * * *'
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          ONLY_DRAW_CODE: 1PM
        run: python backend/sync_results.py

      - name: Run 6PM Sync
        if: |
          github.event.schedule == '40 12 * * *' ||
          github.event.schedule == '50 12 * * *' ||
          github.event.schedule == '10 13 * * *'
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          ONLY_DRAW_CODE: 6PM
        run: python backend/sync_results.py

      - name: Run 8PM Sync
        if: |
          github.event.schedule == '40 14 * * *' ||
          github.event.schedule == '50 14 * * *' ||
          github.event.schedule == '10 15 * * *'
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          ONLY_DRAW_CODE: 8PM
        run: python backend/sync_results.py

      - name: Manual Run All
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.draw_code == 'ALL'
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python backend/sync_results.py

      - name: Manual Run Single Draw
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.draw_code != 'ALL'
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          ONLY_DRAW_CODE: ${{ github.event.inputs.draw_code }}
        run: python backend/sync_results.py
