name: Lottery Sync Automation

on:
  schedule:
    # 1:15, 1:20, 1:25 PM IST
    - cron: '45 7 * * *'
    - cron: '50 7 * * *'
    - cron: '55 7 * * *'

    # 6:15, 6:20, 6:25 PM IST
    - cron: '45 12 * * *'
    - cron: '50 12 * * *'
    - cron: '55 12 * * *'

    # 8:15, 8:20, 8:25 PM IST
    - cron: '45 14 * * *'
    - cron: '50 14 * * *'
    - cron: '55 14 * * *'

  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Lottery Sync
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python backend/sync_results.py
